name: Feature request
description: Suggest an improvement or new capability.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that loopd makes hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: What you'd like
      description: The change you have in mind. Rough is fine.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Optional.
