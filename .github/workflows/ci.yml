name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref (saves minutes on rapid pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
        # loopd is filesystem/git-heavy; smoke-test on macOS too (one version).
        include:
          - os: macos-latest
            python: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Configure git (ledger tests create repos)
        run: |
          git config --global user.email ci@example.com
          git config --global user.name ci
      - name: Unit + end-to-end tests (stdlib only, no network, no API)
        run: python -m unittest discover -s tests -v

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build the wheel + sdist
        run: |
          python -m pip install --upgrade build twine
          python -m build
      - name: Validate package metadata (twine check)
        run: twine check dist/*
      - name: Confirm prompts + assets are bundled
        run: |
          python - <<'PY'
          import glob, zipfile
          whl = glob.glob("dist/*.whl")[0]
          names = zipfile.ZipFile(whl).namelist()
          assert any(n.endswith("orchestrator/prompts/pm_system.md") for n in names), "prompts missing from wheel"
          assert any("orchestrator/assets/loopd.svg" in n for n in names), "assets missing from wheel"
          print("wheel OK:", whl)
          PY
